<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Portfolio</title>

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- 🔹 Navbar -->
<nav class="navbar navbar-dark bg-dark navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="#">My Portfolio</a>
  </div>
</nav>

<!-- 🔹 About Section -->
<div class="container text-center mt-5">
  <h1 id="name">Your Name</h1>
  <p id="about">I am a Web Developer</p>
  <button class="btn btn-primary" onclick="changeText()">Click Me</button>
</div>

<!-- 🔹 Projects Section -->
<div class="container mt-5">
  <h2 class="text-center">My Projects</h2>
  <div class="row" id="projectList"></div>
</div>

<!-- 🔹 Contact -->
<div class="container text-center mt-5 mb-5">
  <h2>Contact</h2>
  <p>Email: youremail@gmail.com</p>
</div>

<!-- 🔹 JavaScript -->
<script>

  // Change text using JS
  function changeText(){
    document.getElementById("about").innerHTML = "I am a JavaScript Developer 🚀";
  }

  // Projects Array
  let projects = [
    {name: "Project 1", desc: "Simple Website"},
    {name: "Project 2", desc: "Calculator"},
    {name: "Project 3", desc: "Todo App"}
  ];

  let projectList = document.getElementById("projectList");

  projects.map((item)=>{
    let col = document.createElement("div");
    col.classList.add("col-md-4");

    col.innerHTML = `
      <div class="card mt-3">
        <div class="card-body text-center">
          <h5>${item.name}</h5>
          <p>${item.desc}</p>
        </div>
      </div>
    `;

    projectList.append(col);
  });

</script>

</body>
</html>
