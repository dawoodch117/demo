<script>

   // Projects Array
  let projects = [
    {name: "Project 1", desc: "Simple Website"},
    {name: "Project 2", desc: "Calculator"},

  ];

  let projectList = document.getElementById("projectList");

  projects.map((item)=>{
    let col = document.createElement("div");
    // col.classList.add("col-md-4");

    col.innerHTML = `
      <div class="card mt-3">
        <div class="card-body text-center">
          <h5>${item.name}</h5>
          <p>${item.desc}</p>
        </div>
      </div>
    `;

    projectList.append(col);
  });


</script>
